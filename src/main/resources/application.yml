spring:
  cache:
    type: caffeine
    caffeine:
      spec: ${CACHE_CAFFEINE_SPEC:maximumSize=1000,expireAfterWrite=5m}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/flow_engine}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid, email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB

server:
  port: ${PORT:8060}

app:
  encryption:
    secret: ${ENCRYPTION_SECRET:12345678901234567890123456789012}
  jwt:
    secret: ${JWT_SECRET:flowengine-jwt-secret-key-change-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

http:
  client:
    connect-timeout-seconds: ${HTTP_CONNECT_TIMEOUT:10}
    read-timeout-seconds: ${HTTP_READ_TIMEOUT:120}
    write-timeout-seconds: ${HTTP_WRITE_TIMEOUT:30}
    max-connections: ${HTTP_MAX_CONNECTIONS:20}
    max-connections-per-host: ${HTTP_MAX_CONNECTIONS_PER_HOST:10}
    keep-alive-minutes: ${HTTP_KEEP_ALIVE_MINUTES:5}
    max-concurrent-requests: ${HTTP_MAX_CONCURRENT_REQUESTS:20}
    max-concurrent-requests-per-host: ${HTTP_MAX_CONCURRENT_REQUESTS_PER_HOST:10}

scheduler:
  thread-pool-size: ${SCHEDULER_POOL_SIZE:20}

bulk:
  executor:
    thread-pool-size: ${BULK_EXECUTOR_POOL_SIZE:10}

flow-executor:
  # API flows: lightweight, IO-bound (mostly waiting on HTTP responses, not CPU).
  # IO-bound work can run far more concurrent threads than CPU cores without contention,
  # since most threads are blocked waiting on the network, not competing for CPU time.
  # Default formula: cores * 4 (a conservative IO-bound multiplier — tune up if profiling
  # shows threads are mostly idle/waiting, tune down if you see CPU saturation instead).
  api:
    core-pool-size: ${API_FLOW_EXECUTOR_CORE:0}      # 0 = auto (cores * 4, min 8)
    max-pool-size: ${API_FLOW_EXECUTOR_MAX:0}        # 0 = auto (core * 2)
    queue-capacity: ${API_FLOW_EXECUTOR_QUEUE:100}   # bounded — see ExecutorService for why
  # UI flows: heavy. Each one launches a real Chromium process — memory and CPU heavy, not
  # IO-bound. Keep this small and separate from the API pool so a handful of stuck/slow
  # browser sessions can never starve lightweight API flows of a thread (bulkhead pattern).
  ui:
    core-pool-size: ${UI_FLOW_EXECUTOR_CORE:2}
    max-pool-size: ${UI_FLOW_EXECUTOR_MAX:4}
    queue-capacity: ${UI_FLOW_EXECUTOR_QUEUE:20}
  # Delay between dispatching each flow in a parallel module run. Prevents all flows from
  # hitting the same auth/login endpoint at the exact same millisecond — confirmed root cause
  # of the "2 of 3 simultaneous logins return 401" bug (backend enforces single-session-per-
  # account and rejects concurrent logins). 300ms is enough for the first flow to complete
  # its login before the next one starts. Set to 0 to disable if your flows use separate accounts.
  parallel-stagger-ms: ${PARALLEL_STAGGER_MS:300}

# LLM — Groq is the default for both local and deployed.
# Get a free key at https://console.groq.com and set GROQ_API_KEY env var.
llm:
  provider: ${LLM_PROVIDER:ollama}

groq:
  api:
    key: ${GROQ_API_KEY:}
  model: ${GROQ_MODEL:llama-3.3-70b-versatile}

# Ollama kept as fallback — set LLM_PROVIDER=ollama to use it.
# Requires a model that's reliable at verbatim copy-from-context + strict JSON.
# llama3.1:8b tends to invent locators instead of copying them — prefer qwen2.5:14b-instruct
# (or qwen2.5:32b-instruct if you have the VRAM). Run: ollama pull qwen2.5:14b-instruct
ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:qwen2.5:14b-instruct}

# UI Automation — Playwright
# headless=false shows the browser window during scraping/generation (good for local dev)
# Set to true in Docker/CI where there's no display
ui:
  automation:
    headless: ${UI_AUTOMATION_HEADLESS:false}
    slow-mo-ms: ${UI_AUTOMATION_SLOW_MO:800}  # ms between actions so user can follow along

logging:
  level:
    org.springframework.cache: ${CACHE_LOG_LEVEL:INFO}
    com.example.flowengine.service.AppAssistantService: INFO
    com.example.flowengine.service.AssertionGeneratorService: DEBUG
    # Temporary — wire-level logging for parallel flow auth failure root cause.
    # Set to INFO once the bug is found and the [WIRE] log block is removed.
    com.example.flowengine.service.ExecutorService: ${EXECUTOR_LOG_LEVEL:DEBUG}
    com.itextpdf.layout.renderer.TableWidths: ERROR